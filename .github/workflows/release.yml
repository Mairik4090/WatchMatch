name: Build Jellyfin Plugin Release

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'web/**'
      - 'build.yaml'
  workflow_dispatch:
    inputs:
      version:
        description: Jellyfin plugin version
        required: false
      tag:
        description: GitHub release tag
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="${{ github.event.inputs.tag }}"
          else
            VERSION=$(grep -oP '(?<=<Version>).*?(?=</Version>)' server/Jellyfin.Plugin.WatchMatch/Jellyfin.Plugin.WatchMatch.csproj)
            TAG="v$VERSION"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "asset=Jellyfin.Plugin.WatchMatch.zip" >> "${GITHUB_OUTPUT}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore WatchMatch.sln

      - name: Test
        run: dotnet test WatchMatch.sln --configuration Release --no-restore

      - name: Publish plugin
        run: dotnet publish server/Jellyfin.Plugin.WatchMatch/Jellyfin.Plugin.WatchMatch.csproj --configuration Release --no-restore --output artifacts/package

      - name: Keep only plugin assembly artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/plugin | Out-Null
          Copy-Item artifacts/package/Jellyfin.Plugin.WatchMatch.dll artifacts/plugin/
          Copy-Item artifacts/package/Jellyfin.Plugin.WatchMatch.xml artifacts/plugin/ -ErrorAction SilentlyContinue
          Copy-Item artifacts/package/Jellyfin.Plugin.WatchMatch.pdb artifacts/plugin/ -ErrorAction SilentlyContinue

      - name: Package plugin zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/release | Out-Null
          Compress-Archive -Path artifacts/plugin/* -DestinationPath "artifacts/release/${{ steps.meta.outputs.asset }}" -Force

      - name: Compute checksum
        id: checksum
        shell: bash
        run: |
          CHECKSUM="$(md5sum "artifacts/release/${{ steps.meta.outputs.asset }}" | awk '{print toupper($1)}')"
          echo "value=${CHECKSUM}" >> "${GITHUB_OUTPUT}"

      - name: Update plugin repository manifest
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const manifestPath = 'manifest.json';
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          if (!Array.isArray(manifest)) {
            throw new Error('Jellyfin plugin repository manifest must be a JSON array.');
          }
          const targetVersion = '${{ steps.meta.outputs.version }}';
          
          let versionEntry = manifest[0].versions.find(v => v.version === targetVersion);
          if (!versionEntry) {
            // Create a new entry by copying the targetAbi from the first one
            versionEntry = {
              version: targetVersion,
              changelog: 'Automated release',
              targetAbi: manifest[0].versions[0].targetAbi,
              sourceUrl: '',
              checksum: '',
              timestamp: ''
            };
            manifest[0].versions.unshift(versionEntry);
          }
          
          versionEntry.sourceUrl = 'https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/${{ steps.meta.outputs.asset }}';
          versionEntry.checksum = '${{ steps.checksum.outputs.value }}';
          versionEntry.timestamp = new Date().toISOString().replace(/\.\d{3}Z$/, 'Z');
          
          fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + '\n');
          NODE

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ steps.meta.outputs.tag }}" --yes --cleanup-tag || true
          git tag -f "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}" --force
          gh release create "${{ steps.meta.outputs.tag }}" "artifacts/release/${{ steps.meta.outputs.asset }}" \
            --title "WatchMatch ${{ steps.meta.outputs.version }}" \
            --notes "Automated plugin release. Check the plugin repository manifest for changelog details."

      - name: Create Pull Request for Manifest
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update plugin manifest for ${{ steps.meta.outputs.tag }}"
          title: "chore: update plugin manifest for ${{ steps.meta.outputs.tag }}"
          branch: "chore/update-manifest-${{ steps.meta.outputs.tag }}"
          body: "Automated manifest update for release ${{ steps.meta.outputs.tag }}."
